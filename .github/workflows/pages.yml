name: Publicar producao e homologacao

on:
  push:
    branches:
      - main
      - homolog
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  solicitar-publicacao:
    if: github.ref == 'refs/heads/homolog'
    runs-on: ubuntu-latest
    steps:
      - name: Publicar pelo contexto autorizado da main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail-with-body \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/pages.yml/dispatches" \
            --data '{"ref":"main"}'

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Obter producao
        uses: actions/checkout@v4
        with:
          ref: main
          path: source-main

      - name: Obter homologacao
        uses: actions/checkout@v4
        with:
          ref: homolog
          path: source-homolog

      - name: Montar as duas paginas
        shell: bash
        run: |
          mkdir -p _site/homolog
          EXCLUDES=(
            --exclude='.git/'
            --exclude='.github/'
            --exclude='.claude/'
            --exclude='.firebase/'
            --exclude='backups*/'
            --exclude='design/'
            --exclude='docs/'
            --exclude='test/'
            --exclude='_arquivo/'
            --exclude='*.md'
            --exclude='*.log'
            --exclude='firebase.json'
            --exclude='firestore.rules'
            --exclude='package.json'
            --exclude='package-lock.json'
          )
          rsync -a "${EXCLUDES[@]}" source-main/ _site/
          rsync -a "${EXCLUDES[@]}" source-homolog/ _site/homolog/
          touch _site/.nojekyll

      - name: Preparar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publicar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
