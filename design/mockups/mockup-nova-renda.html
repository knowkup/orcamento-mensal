<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup — Nova Renda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,450;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #eef4f3;
    --surface:      #ffffff;
    --surface-soft: #f5f8f7;
    --ink:          #131b17;
    --muted:        #66736d;
    --line:         #d7e0dc;
    --green:        #35b879;
    --green-soft:   #edfaf4;
    --gold:         #b88732;
    --shadow:       0 16px 42px rgba(6,35,58,.07);
    --r:            8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    font-weight: 450;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-wrap: wrap;
    gap: 40px;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 24px;
  }

  .col { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .col-label {
    font-size: 11px; font-weight: 600; color: var(--muted);
    letter-spacing: .06em; text-transform: uppercase;
  }

  /* ── Modal ── */
  .dialog {
    background: var(--surface);
    border-radius: var(--r);
    box-shadow: var(--shadow);
    border: 1px solid var(--line);
    width: 440px;
    padding: 22px 22px 20px;
  }
  .panel-heading {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; margin-bottom: 20px;
  }
  .eyebrow {
    font-size: 12px; font-weight: 650; color: var(--gold);
    text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px;
  }
  .panel-heading h2 { font-size: 20px; font-weight: 650; color: var(--ink); }
  .icon-button {
    width: 42px; height: 42px; flex-shrink: 0;
    border: 1px solid var(--line); border-radius: var(--r);
    background: var(--surface); color: var(--muted);
    cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── Form ── */
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field > label {
    font-size: 12px; font-weight: 600; color: var(--ink); letter-spacing: .02em;
  }
  .field select,
  .field input {
    border: 1px solid var(--line); border-radius: var(--r);
    padding: 9px 10px; font-size: 14px;
    font-family: inherit; font-weight: 450; color: var(--ink);
    background: var(--surface); width: 100%; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .field select:focus, .field input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(53,184,121,.12);
  }
  .field input[disabled] {
    background: var(--surface-soft); color: var(--muted); cursor: default;
  }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ── Logo row ── */
  .logo-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--surface-soft); border: 1px solid var(--line);
    border-radius: var(--r);
  }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--green); color: #fff;
    font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .logo-info { flex: 1; }
  .logo-info span { font-size: 13px; color: var(--ink); font-weight: 500; display: block; }
  .logo-info small { font-size: 11px; color: var(--muted); }
  .trocar {
    font-size: 12px; font-weight: 600; color: var(--green);
    background: none; border: none; cursor: pointer;
    padding: 4px 8px; border-radius: 6px;
  }

  /* ── Divisor ── */
  .divider { height: 1px; background: var(--line); }
  .section-label {
    font-size: 11px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .05em;
    margin-bottom: -4px;
  }

  /* ── Faixa líquido ── */
  .liquido-strip {
    background: var(--green-soft);
    border: 1px solid #b3ecd4;
    border-radius: var(--r);
    padding: 11px 14px;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .liquido-strip .liq-label {
    font-size: 13px; color: #1a6b3a; font-weight: 500;
  }
  .liquido-strip .liq-valor {
    font-size: 17px; font-weight: 700; color: #1a6b3a;
  }
  .liquido-strip .liq-hint {
    font-size: 11px; color: #4aab7a; display: block; margin-top: 1px;
  }

  /* ── Botão salvar ── */
  .btn-save {
    width: 100%; padding: 12px;
    background: var(--green); color: #fff;
    border: none; border-radius: var(--r);
    font-size: 14px; font-weight: 600; font-family: inherit;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 7px; margin-top: 2px;
  }
  .btn-save:hover { background: #2da569; }
</style>
</head>
<body>

<!-- ═══ ESTADO: Salário ATP ═══ -->
<div class="col">
  <div class="col-label">Estado — Salário ATP</div>
  <div class="dialog">
    <div class="panel-heading">
      <div>
        <p class="eyebrow">Renda recorrente</p>
        <h2>Nova renda</h2>
      </div>
      <button class="icon-button">✕</button>
    </div>

    <div class="stack">

      <!-- Logo -->
      <div class="logo-row">
        <div class="avatar">AT</div>
        <div class="logo-info">
          <span>Logo da renda</span>
          <small>PNG ou JPG · opcional</small>
        </div>
        <button class="trocar">Trocar</button>
      </div>

      <!-- Renda -->
      <div class="field">
        <label>Renda</label>
        <select>
          <option>Salário ATP</option>
          <option>Aluguel Matheus</option>
          <option>Uber</option>
        </select>
      </div>

      <!-- Titular + Data inicial -->
      <div class="row2">
        <div class="field">
          <label>Titular</label>
          <select>
            <option>Felipe</option>
            <option>Kah</option>
          </select>
        </div>
        <div class="field">
          <label>Data inicial</label>
          <input type="date" value="2026-06-01">
        </div>
      </div>

      <div class="divider"></div>
      <p class="section-label">Dados CLT</p>

      <!-- Salário bruto -->
      <div class="field">
        <label>Salário bruto</label>
        <input type="text" value="R$ 8.500,00">
      </div>

      <!-- Alimentação + Consignado -->
      <div class="row2">
        <div class="field">
          <label>Desconto alimentação (%)</label>
          <input type="number" value="1" step="0.01" min="0" max="100">
        </div>
        <div class="field">
          <label>Consignado mensal</label>
          <input type="text" placeholder="R$ 0,00 · opcional">
        </div>
      </div>

      <!-- Faixa líquido -->
      <div class="liquido-strip">
        <div>
          <span class="liq-label">Salário líquido estimado</span>
          <span class="liq-hint">Calculado automaticamente pelo sistema</span>
        </div>
        <span class="liq-valor">R$ 6.218,40</span>
      </div>

      <button class="btn-save">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Salvar renda
      </button>

    </div>
  </div>
</div>


<!-- ═══ ESTADO: Aluguel / Uber ═══ -->
<div class="col">
  <div class="col-label">Estado — Aluguel Matheus / Uber</div>
  <div class="dialog">
    <div class="panel-heading">
      <div>
        <p class="eyebrow">Renda recorrente</p>
        <h2>Nova renda</h2>
      </div>
      <button class="icon-button">✕</button>
    </div>

    <div class="stack">

      <!-- Logo -->
      <div class="logo-row">
        <div class="avatar" style="background:#265d73">AL</div>
        <div class="logo-info">
          <span>Logo da renda</span>
          <small>PNG ou JPG · opcional</small>
        </div>
        <button class="trocar">Trocar</button>
      </div>

      <!-- Renda -->
      <div class="field">
        <label>Renda</label>
        <select>
          <option>Salário ATP</option>
          <option selected>Aluguel Matheus</option>
          <option>Uber</option>
        </select>
      </div>

      <!-- Titular + Data inicial -->
      <div class="row2">
        <div class="field">
          <label>Titular</label>
          <select>
            <option>Felipe</option>
            <option selected>Kah</option>
          </select>
        </div>
        <div class="field">
          <label>Data inicial</label>
          <input type="date" value="2026-06-10">
        </div>
      </div>

      <!-- Valor -->
      <div class="field">
        <label>Valor</label>
        <input type="text" placeholder="R$ 0,00">
      </div>

      <button class="btn-save" style="margin-top:6px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Salvar renda
      </button>

    </div>
  </div>
</div>

</body>
</html>
